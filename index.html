<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Капсула Времени — Выпуск 2026</title>
  <style>
    /* Общие стили и шрифты */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      color: #333;
      line-height: 1.6;
    }

    /* Шапка сайта */
    header {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: #fff;
      text-align: center;
      padding: 60px 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }
    header h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    header p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    /* Основной контейнер */
    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* Блок с общим фото */
    .main-photo-container {
      background: #fff;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
      margin-bottom: 40px;
      text-align: center;
    }
    .main-photo {
      width: 100%;
      max-height: 550px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }
    .photo-caption {
      margin-top: 12px;
      font-style: italic;
      color: #666;
      font-size: 1.05rem;
    }

    /* Блок с цитатой/информацией */
    .intro-text {
      background-color: #fff;
      border-left: 5px solid #2a5298;
      padding: 25px;
      border-radius: 0 12px 12px 0;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
      margin-bottom: 40px;
    }
    .intro-text h2 {
      color: #1e3c72;
      margin-bottom: 10px;
    }

    /* Кнопка действия (Переход к коллажу) */
    .action-space {
      text-align: center;
      margin-top: 30px;
    }
    .btn-enter {
      display: inline-block;
      padding: 18px 40px;
      background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
      color: #fff;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 50px;
      box-shadow: 0 5px 15px rgba(42, 82, 152, 0.3);
      transition: all 0.3s ease;
    }
    .btn-enter:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(42, 82, 152, 0.5);
      background: linear-gradient(135deg, #3a63a8 0%, #2a5298 100%);
    }

    /* Подвал сайта */
    footer {
      background-color: #1e3c72;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      padding: 30px 20px;
      margin-top: 80px;
      font-size: 0.95rem;
    }
    
    /* Адаптивность для мобилок */
    @media (max-width: 768px) {
      header h1 { font-size: 2rem; }
      header p { font-size: 1rem; }
      .btn-enter { width: 100%; padding: 15px 20px; }
    }
  </style>
</head>
<body>

  <!-- Шапка страницы -->
  <header>
    <h1>Выпуск 2026</h1>
    <p>Капсула времени нашего класса</p>
  </header>

  <div class="container">
    
    <!-- Блок главного общего фото -->
    <div class="main-photo-container">
      <!-- Замени 'main_group.webp' на реальное имя файла из папки images -->
      <img src="images/main.webp" alt="Наш класс" class="main-photo">
      <div class="photo-caption">Мы молоды, счастливы и готовы покорять этот мир. Май 2026 года.</div>
    </div>

    <!-- Текстовое послание -->
    <div class="intro-text">
      <h2>Привет из 2026 года!</h2>
      <p>Этот сайт был создан в год нашего выпуска... контент будет позже.</p>
    </div>

    <!-- Кнопка перехода к будущему коллажу -->
    <div class="action-space">
      <a href="collage.html" class="btn-enter">Открыть архив воспоминаний</a>
    </div>

  </div>

  <!-- Подвал -->
  <footer>
    <p>Создано с умом в 2026 году. До встречи в мае 2036 года! ⏳</p>
  </footer>

</body>
</html>
