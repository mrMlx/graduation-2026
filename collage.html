<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Галерея воспоминаний</title>
  <style>
    body { background-color: #fff; margin: 0; padding: 5px; font-family: sans-serif; }

    /* Сетка галереи */
    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 4px; /* Вплотную, с минимальным зазором */
    }

    .gallery-item {
      height: 250px;       /* Одинаковая высота рядов */
      flex-grow: 1;        /* Растягиваются в ширину */
      object-fit: contain; /* Не обрезаются, сохраняют формат */
      background-color: #f4f7f6;
      cursor: pointer;     /* Меняем курсор на палец при наведении */
      transition: transform 0.2s ease;
    }

    .gallery-item:hover {
      transform: scale(1.01); /* Легкий эффект при наведении */
    }

    /* Стили для полноэкранного режима (Лайтбокс) */
    .lightbox {
      display: none; /* По умолчанию скрыт */
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9); /* Темный полупрозрачный фон */
      justify-content: center;
      align-items: center;
    }

    /* Медиаконтент на весь экран */
    .lightbox-content {
      max-width: 95%;
      max-height: 95%;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    /* Кнопка возврата на главную */
    .back-btn { text-align: center; margin: 40px; }
    .back-btn a { color: #1e3c72; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>

  <div class="gallery">
    <img src="images/90e.webp" class="gallery-item" alt="Воспоминание">
    <img src="images/Sanek.webp" class="gallery-item" alt="Воспоминание">
    
    <video src="images/video1.mp4" class="gallery-item" controls loop muted playsinline></video>
    
    <img src="images/group.webp" class="gallery-item" alt="Воспоминание">
    
    <video src="images/video2.mp4" class="gallery-item" controls loop muted playsinline></video>
    
    <img src="images/photo4.webp" class="gallery-item" alt="Воспоминание">
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <div id="lightbox-media-container"></div>
  </div>

  <div class="back-btn">
    <a href="index.html">← Назад на главную</a>
  </div>

  <script>
    const lightbox = document.getElementById('lightbox');
    const container = document.getElementById('lightbox-media-container');

    // Находим все элементы галереи (и картинки, и видео)
    document.querySelectorAll('.gallery-item').forEach(item => {
      item.addEventListener('click', (e) => {
        // Если кликнули на встроенные кнопки плеера прямо в сетке — не открываем большое окно
        if (item.tagName === 'VIDEO' && e.target !== item) return;

        container.innerHTML = ''; // Очищаем контейнер от старого контента

        if (item.tagName === 'IMG') {
          // Если кликнули на картинку
          const img = document.createElement('img');
          img.src = item.src;
          img.className = 'lightbox-content';
          img.alt = 'Крупный план';
          container.appendChild(img);
        } else if (item.tagName === 'VIDEO') {
          // Если кликнули на видео — создаем плеер со звуком и управлением
          const video = document.createElement('video');
          video.src = item.src;
          video.className = 'lightbox-content';
          video.controls = true;
          video.autoplay = true;
          video.loop = true;
          container.appendChild(video);
        }

        lightbox.style.display = 'flex'; // Показываем темный экран
      });
    });

    // Функция закрытия
    function closeLightbox(event) {
      // Закрываем окно ТОЛЬКО если кликнули по черному фону (самому лайтбоксу), 
      // а не по видео, картинке или кнопкам управления плеера
      if (event.target === lightbox) {
        lightbox.style.display = 'none';
        container.innerHTML = ''; // Полностью удаляем медиа, чтобы звук видео прекратился
      }
    }
  </script>

</body>
</html>
